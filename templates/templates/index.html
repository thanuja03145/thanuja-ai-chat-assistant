<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Chat Assistant</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .chat-container { width: 400px; background: white; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); padding: 20px; }
        h2 { text-align: center; color: #333; }
        .chat-box { height: 300px; border: 1px solid #ddd; padding: 10px; overflow-y: auto; margin-bottom: 10px; border-radius: 4px; }
        .input-area { display: flex; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; margin-left: 5px; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="chat-container">
        <h2>🤖 AI Chat Assistant</h2>
        <div class="chat-box" id="chatBox"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
    <script>
        function sendMessage() {
            let input = document.getElementById('userInput');
            let box = document.getElementById('chatBox');
            if(input.value.trim() !== "") {
                box.innerHTML += "<p><b>You:</b> " + input.value + "</p>";
                input.value = "";
            }
        }
    </script>
</body>
</html>
