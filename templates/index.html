<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat Assistant - Thanuja</title>
    <style>
        /* Modern CSS Styling */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chat-container { width: 450px; max-width: 90%; background: rgba(255, 255, 255, 0.95); border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; display: flex; flex-direction: column; height: 80vh; }
        .chat-header { background: #764ba2; color: white; padding: 20px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        .chat-box { flex: 1; padding: 20px; overflow-y: auto; background: #f5f7fb; display: flex; flex-direction: column; gap: 12px; }
        .message { padding: 12px 16px; border-radius: 12px; max-width: 75%; font-size: 0.95rem; }
        .user-message { background: #764ba2; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .ai-message { background: #e2e8f0; color: #333; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { display: flex; padding: 15px; background: white; border-top: 1px solid #e2e8f0; }
        input { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; outline: none; }
        button { background: #764ba2; color: white; border: none; padding: 12px 20px; margin-left: 10px; cursor: pointer; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">🤖 Thanuja's AI Chat Assistant</div>
        <div class="chat-box" id="chatBox">
            <div class="message ai-message">Hello! I am your Gemini AI Assistant. How can I help you today?</div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Ask something intelligent..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        // Interactive JavaScript Logic
        function sendMessage() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chatBox');
            const text = input.value.trim();
            
            if (text !== "") {
                const userDiv = document.createElement('div');
                userDiv.className = 'message user-message';
                userDiv.innerText = text;
                box.appendChild(userDiv);
                
                input.value = "";
                box.scrollTop = box.scrollHeight;

                setTimeout(() => {
                    const aiDiv = document.createElement('div');
                    aiDiv.className = 'message ai-message';
                    aiDiv.innerText = "Processing your request with Gemini API model...";
                    box.appendChild(aiDiv);
                    box.scrollTop = box.scrollHeight;
                }, 800);
            }
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') { sendMessage(); }
        }
    </script>
</body>
</html>
